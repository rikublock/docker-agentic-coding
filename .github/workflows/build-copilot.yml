name: Build Copilot Image

on:
  schedule:
    # every day at 03:00 UTC
    - cron: "0 3 * * *"

  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/reusable-agent-build.yml
    with:
      image_name: copilot
      dockerfile: copilot/Dockerfile
      npm_package: "@github/copilot"
