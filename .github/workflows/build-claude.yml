name: Build Claude Image

on:
  schedule:
    # every day at 03:00 UTC
    - cron: "0 3 * * *"

  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/reusable-agent-build.yml
    with:
      image_name: claude
      dockerfile: claude/Dockerfile
      npm_package: "@anthropic-ai/claude-code"
